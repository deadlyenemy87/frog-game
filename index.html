<!DOCTYPE html>
<html>
<head>

<title>Frog Bug Hunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:#1f6f3f;
color:white;
touch-action:manipulation;
}

canvas{
background:#7ec850;
border:4px solid #0b3d1d;
max-width:95%;
height:auto;
}

#controls{
margin-top:20px;
display:grid;
grid-template-columns:110px 110px 110px;
gap:22px;
justify-content:center;
}

button{
font-size:34px;
width:100px;
height:100px;
border:none;
border-radius:18px;
background:#2ecc71;
color:white;
}

#tongue{
background:#ff4d4d;
}

#menu{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.7);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

</style>
</head>

<body>

<h1>🐸 Frog Bug Hunter</h1>

<div id="menu">
<h2 id="menuTitle">Catch the Bugs!</h2>
<button onclick="startGame()">Start Game</button>
</div>

<canvas id="game" width="600" height="400"></canvas>

<div id="controls">

<div id="joystickArea">
<div id="joystickBase">
<div id="joystickKnob"></div>
</div>
</div>

<button id="tongue">👅</button>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameRunning=false;
let level=1;
let score=0;
let bugsNeeded=5;
let timeLeft=30;

let frog={
x:300,
y:200,
angle:0,
tongueLength:0,
tongueActive:false
};

let bugs=[];

function spawnBugs(){

bugs=[];

let bossLevel = level % 3 === 0;

if(bossLevel){

bugs.push({
x:Math.random()*560+20,
y:Math.random()*360+20,
speed:1+level*0.3,
size:18,
boss:true
});

}else{

for(let i=0;i<bugsNeeded;i++){

bugs.push({
x:Math.random()*560+20,
y:Math.random()*360+20,
speed:1+level*0.4,
size:8,
boss:false
});

}

}

}

function drawBackground(){

ctx.fillStyle="#7ec850";
ctx.fillRect(0,0,canvas.width,canvas.height);

}

function drawFrog(){

ctx.save();

ctx.translate(frog.x,frog.y);
ctx.rotate(frog.angle);

ctx.fillStyle="green";
ctx.beginPath();
ctx.arc(0,0,25,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(-10,-15,8,0,Math.PI*2);
ctx.arc(10,-15,8,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";

ctx.beginPath();
ctx.arc(-10,-15,3,0,Math.PI*2);
ctx.arc(10,-15,3,0,Math.PI*2);
ctx.fill();

if(frog.tongueActive){

ctx.strokeStyle="red";
ctx.lineWidth=4;

ctx.beginPath();
ctx.moveTo(0,0);
ctx.lineTo(0,-frog.tongueLength);
ctx.stroke();

frog.tongueLength+=6;

if(frog.tongueLength>100){
frog.tongueActive=false;
frog.tongueLength=0;
}

}

ctx.restore();

}

function drawBug(bug){

ctx.fillStyle = bug.boss ? "red" : "black";

ctx.beginPath();
ctx.arc(bug.x,bug.y,bug.size,0,Math.PI*2);
ctx.fill();

}

function updateBugs(){

bugs.forEach(bug=>{

bug.x+=Math.sin(Date.now()*0.004)*bug.speed;
bug.y+=Math.cos(Date.now()*0.004)*bug.speed;

});

}

function rotateFrog(){

if(bugs.length===0) return;

let target = bugs[0];

let dx = target.x - frog.x;
let dy = target.y - frog.y;

frog.angle = Math.atan2(dy,dx) + Math.PI/2;

}

function checkCatch(){

if(!frog.tongueActive) return;

bugs = bugs.filter(bug=>{

let dx=frog.x-bug.x;
let dy=frog.y-bug.y;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<25){
score++;
return false;
}

return true;

});

}

function drawHUD(){

ctx.fillStyle="black";
ctx.font="18px Arial";

ctx.fillText("Level: "+level,10,20);
ctx.fillText("Score: "+score,10,40);
ctx.fillText("Time: "+timeLeft,10,60);

}

function nextLevel(){

if(level>=20){

gameOver("You beat all 20 levels!");

return;

}

level++;
bugsNeeded++;
timeLeft=30;

spawnBugs();

}

function startGame(){

document.getElementById("menu").style.display="none";

level=1;
score=0;
bugsNeeded=5;
timeLeft=30;

spawnBugs();

gameRunning=true;

}

function gameOver(text){

gameRunning=false;

document.getElementById("menuTitle").innerText=text+" Score: "+score;

document.getElementById("menu").style.display="flex";

}

setInterval(()=>{

if(!gameRunning) return;

timeLeft--;

if(timeLeft<=0){

if(score>=bugsNeeded){
nextLevel();
}else{
gameOver("Game Over!");
}

}

},1000);

function gameLoop(){

drawBackground();

rotateFrog();

updateBugs();

drawFrog();

bugs.forEach(drawBug);

checkCatch();

drawHUD();

if(bugs.length===0){
nextLevel();
}

requestAnimationFrame(gameLoop);

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp") frog.y-=25;
if(e.key==="ArrowDown") frog.y+=25;
if(e.key==="ArrowLeft") frog.x-=25;
if(e.key==="ArrowRight") frog.x+=25;

if(e.key===" "){
frog.tongueActive=true;
frog.tongueLength=0;
}

});

document.getElementById("up").ontouchstart=()=>frog.y-=30;
document.getElementById("down").ontouchstart=()=>frog.y+=30;
document.getElementById("left").ontouchstart=()=>frog.x-=30;
document.getElementById("right").ontouchstart=()=>frog.x+=30;

document.getElementById("tongue").ontouchstart=()=>{

frog.tongueActive=true;
frog.tongueLength=0;

};

gameLoop();

</script>

</body>
</html>
