<!DOCTYPE html>
<html>
<head>

<title>Frog Bug Hunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>

body{
margin:0;
font-family:Arial;
background:#063d1e;
color:white;
text-align:center;
touch-action:none;
overflow:hidden;
}

#gameContainer{
position:relative;
max-width:700px;
margin:auto;
}

canvas{
background:#2e5d1a;
border:5px solid black;
width:100%;
}

#hud{
position:absolute;
top:10px;
left:10px;
font-size:18px;
text-align:left;
}

#pauseBtn{
position:absolute;
top:10px;
right:10px;
padding:6px 14px;
font-size:16px;
background:#222;
color:white;
border:none;
border-radius:6px;
}

#levelMessage{
position:absolute;
top:35%;
width:100%;
font-size:30px;
font-weight:bold;
display:none;
}

#scoreBoard{
margin-top:10px;
font-size:14px;
}

#startScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
}

#startBtn{
font-size:26px;
padding:15px 40px;
margin-top:20px;
border:none;
border-radius:12px;
background:#4CAF50;
color:white;
}

#joystick{
position:fixed;
bottom:30px;
left:30px;
width:120px;
height:120px;
background:rgba(0,255,0,0.3);
border-radius:50%;
}

#stick{
position:absolute;
width:50px;
height:50px;
background:#0a5a2f;
border-radius:50%;
top:35px;
left:35px;
}

#tongueBtn{
position:fixed;
bottom:40px;
right:40px;
width:90px;
height:90px;
border-radius:20px;
background:#b71c1c;
font-size:40px;
color:white;
border:none;
}

</style>
</head>

<body>

<h2>🐸 Frog Bug Hunter</h2>

<div id="gameContainer">

<div id="hud">
Level: <span id="level">1</span><br>
Score: <span id="score">0</span><br>
Time: <span id="time">30</span>
</div>

<button id="pauseBtn">Pause</button>

<div id="levelMessage"></div>

<canvas id="game" width="700" height="450"></canvas>

<div id="startScreen">

<h2>How To Play</h2>

<p>
Move with joystick or arrow keys.<br><br>
Tap 👅 or press SPACE to catch flies.<br><br>
Golden flies are worth extra points.<br><br>
Boss flies appear every 3 levels and chase you.<br><br>
Boss flies disappear after 7 seconds if not caught.
</p>

<button id="startBtn">Start Game</button>

<div id="scoreBoard"></div>

</div>

</div>

<div id="joystick">
<div id="stick"></div>
</div>

<button id="tongueBtn">👅</button>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const catchSound=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")

let frog={
x:350,
y:225,
size:25,
speed:5,
tongueLength:0,
tongueMax:140,
tongueActive:false
}

let bugs=[]
let keys={}
let score=0
let level=1
let timeLeft=30
let paused=false
let gameRunning=false
let celebration=false
let levelTransition=false

function spawnBug(){

let speed=1+level*0.4

let golden=Math.random()<0.08

bugs.push({
x:Math.random()*650,
y:Math.random()*400,
vx:(Math.random()-0.5)*speed,
vy:(Math.random()-0.5)*speed,
size:10,
golden:golden
})

}

function spawnBoss(){

bugs.push({
x:Math.random()*650,
y:Math.random()*400,
vx:0,
vy:0,
size:34,
boss:true,
spawnTime:Date.now()
})

}

function startLevel(){

bugs=[]

let count=3+level

for(let i=0;i<count;i++) spawnBug()

if(level%3===0) spawnBoss()

timeLeft=30

document.getElementById("level").innerText=level

levelTransition=false

}

function showMessage(text){

let m=document.getElementById("levelMessage")

m.innerHTML=text
m.style.display="block"

}

function hideMessage(){
document.getElementById("levelMessage").style.display="none"
}

function drawFrog(){

ctx.fillStyle="#1fa34a"

ctx.beginPath()
ctx.arc(frog.x,frog.y,frog.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"

ctx.beginPath()
ctx.arc(frog.x-10,frog.y-20,8,0,Math.PI*2)
ctx.arc(frog.x+10,frog.y-20,8,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(frog.x-10,frog.y-20,3,0,Math.PI*2)
ctx.arc(frog.x+10,frog.y-20,3,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#145c2e"
ctx.lineWidth=6

ctx.beginPath()
ctx.moveTo(frog.x-18,frog.y+10)
ctx.lineTo(frog.x-35,frog.y+25)

ctx.moveTo(frog.x+18,frog.y+10)
ctx.lineTo(frog.x+35,frog.y+25)
ctx.stroke()

if(frog.tongueActive){

ctx.strokeStyle="red"
ctx.lineWidth=8

ctx.beginPath()
ctx.moveTo(frog.x,frog.y)
ctx.lineTo(frog.x,frog.y-frog.tongueLength)
ctx.stroke()

}

}

function drawBug(b){

let age=(Date.now()-b.spawnTime)/1000

if(b.boss){

if(age>7){
bugs.splice(bugs.indexOf(b),1)
return
}

if(age>4){
ctx.globalAlpha=Math.sin(Date.now()*0.02)*0.5+0.5
}

}

ctx.fillStyle=b.golden?"gold":b.boss?"darkred":"black"

ctx.beginPath()
ctx.arc(b.x,b.y,b.size,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="white"
ctx.lineWidth=b.boss?4:2

ctx.beginPath()
ctx.moveTo(b.x-6,b.y-6)
ctx.lineTo(b.x-16,b.y-16)
ctx.moveTo(b.x+6,b.y-6)
ctx.lineTo(b.x+16,b.y-16)
ctx.stroke()

ctx.globalAlpha=1

}

function update(){

if(!gameRunning||paused) return

if(celebration){

frog.x+=Math.random()*20-10
frog.y+=Math.random()*20-10

return
}

if(keys["ArrowUp"]) frog.y-=frog.speed
if(keys["ArrowDown"]) frog.y+=frog.speed
if(keys["ArrowLeft"]) frog.x-=frog.speed
if(keys["ArrowRight"]) frog.x+=frog.speed

bugs.forEach(b=>{

if(b.boss){

let dx=frog.x-b.x
let dy=frog.y-b.y
let d=Math.sqrt(dx*dx+dy*dy)

b.vx=(dx/d)*4
b.vy=(dy/d)*4

}else{

b.x+=b.vx
b.y+=b.vy

}

})

if(frog.tongueActive){

frog.tongueLength+=16

bugs.forEach((b,i)=>{

let dx=b.x-frog.x
let dy=b.y-frog.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<frog.tongueLength){

catchSound.play()

if(b.boss) score+=20
else if(b.golden) score+=10
else score+=1

bugs.splice(i,1)

document.getElementById("score").innerText=score

}

})

if(frog.tongueLength>frog.tongueMax) frog.tongueActive=false

}

if(bugs.length===0 && !levelTransition){

levelTransition=true

if(level===20){

celebration=true

saveScore()

showEndScores()

return

}

level++

showMessage("Get Ready For Level "+level)

setTimeout(()=>{
hideMessage()
startLevel()
},2000)

}

}

function saveScore(){

let scores=JSON.parse(localStorage.getItem("frogScores")||"[]")

scores.push(score)

localStorage.setItem("frogScores",JSON.stringify(scores))

}

function showEndScores(){

let scores=JSON.parse(localStorage.getItem("frogScores")||"[]")

let high=Math.max(...scores)

let list=scores.slice(-5).reverse().join("<br>")

showMessage("YOU WIN!<br><br>Score: "+score+"<br>High Score: "+high+"<br><br>Recent Scores:<br>"+list+"<br><br>Tap To Play Again")

canvas.onclick=()=>location.reload()

}

function draw(){

ctx.clearRect(0,0,700,450)

drawFrog()

bugs.forEach(drawBug)

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

document.addEventListener("keydown",e=>{
keys[e.key]=true
if(e.code==="Space") shootTongue()
})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

function shootTongue(){

if(frog.tongueActive) return

frog.tongueActive=true
frog.tongueLength=0

}

document.getElementById("tongueBtn").onclick=shootTongue

setInterval(()=>{

if(!gameRunning||paused||celebration) return

timeLeft--

document.getElementById("time").innerText=timeLeft

if(timeLeft<=0){

showMessage("GAME OVER<br><br>Tap To Start Again")

canvas.onclick=()=>location.reload()

}

},1000)

document.getElementById("startBtn").onclick=()=>{

document.getElementById("startScreen").style.display="none"

gameRunning=true
startLevel()

}

document.getElementById("pauseBtn").onclick=()=>{

paused=!paused
document.getElementById("pauseBtn").innerText=paused?"Resume":"Pause"

}

let joystick=document.getElementById("joystick")

joystick.addEventListener("touchmove",e=>{

let rect=joystick.getBoundingClientRect()

let x=e.touches[0].clientX-rect.left-60
let y=e.touches[0].clientY-rect.top-60

frog.x+=x*0.05
frog.y+=y*0.05

})

</script>

</body>
</html>
