<!DOCTYPE html>
<html>
<head>

<title>Frog Bug Hunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:#1f6f3f;
color:white;
}

canvas{
background:#7ec850;
border:4px solid #0b3d1d;
max-width:95%;
height:auto;
margin-top:10px;
}

#controls{
margin-top:20px;
display:grid;
grid-template-columns:110px 110px 110px;
grid-template-rows:auto auto auto;
gap:22px;
justify-content:center;
}

button{
font-size:34px;
width:100px;
height:100px;
border:none;
border-radius:18px;
background:#2ecc71;
color:white;
}

button:active{
background:#1e9e54;
}

#tongue{
background:#ff4d4d;
}

#up{grid-column:2;}
#left{grid-column:1;}
#tongue{grid-column:2;}
#right{grid-column:3;}
#down{grid-column:2;}

#menu{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.75);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#menu button{
width:200px;
height:60px;
font-size:24px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>🐸 Frog Bug Hunter</h1>

<div id="menu">
<h2 id="menuTitle">Catch Bugs With Your Frog!</h2>
<button onclick="startGame()">Start Game</button>
</div>

<canvas id="game" width="600" height="400"></canvas>

<div id="controls">

<button id="up">⬆</button>
<button id="left">⬅</button>
<button id="tongue">👅</button>
<button id="right">➡</button>
<button id="down">⬇</button>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameRunning=false;

let level=1;
let score=0;
let bugsNeeded=5;
let timeLeft=30;

let highScore = localStorage.getItem("frogHighScore") || 0;

let frog={
x:300,
y:200,
size:25,
jump:0,
tongueLength:0,
tongueActive:false
};

let bugs=[];

function playBeep(freq){
let ctxAudio=new AudioContext();
let osc=ctxAudio.createOscillator();
osc.frequency.value=freq;
osc.connect(ctxAudio.destination);
osc.start();
osc.stop(ctxAudio.currentTime+0.1);
}

function spawnBugs(){

bugs=[];

for(let i=0;i<bugsNeeded;i++){

bugs.push({
x:Math.random()*560+20,
y:Math.random()*360+20,
speed:1+level*0.4,
wing:0
});

}

}

function drawBackground(){

ctx.fillStyle="#7ec850";
ctx.fillRect(0,0,canvas.width,canvas.height);

}

function drawFrog(){

frog.jump=Math.sin(Date.now()*0.01)*3;

ctx.fillStyle="green";

ctx.beginPath();
ctx.arc(frog.x,frog.y+frog.jump,frog.size,0,Math.PI*2);
ctx.fill();

ctx.fillRect(frog.x-18,frog.y+15+frog.jump,10,15);
ctx.fillRect(frog.x+8,frog.y+15+frog.jump,10,15);

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(frog.x-10,frog.y-15+frog.jump,8,0,Math.PI*2);
ctx.arc(frog.x+10,frog.y-15+frog.jump,8,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";

ctx.beginPath();
ctx.arc(frog.x-10,frog.y-15+frog.jump,3,0,Math.PI*2);
ctx.arc(frog.x+10,frog.y-15+frog.jump,3,0,Math.PI*2);
ctx.fill();

if(frog.tongueActive){

ctx.strokeStyle="red";
ctx.lineWidth=4;

ctx.beginPath();
ctx.moveTo(frog.x,frog.y);
ctx.lineTo(frog.x,frog.y-frog.tongueLength);
ctx.stroke();

frog.tongueLength+=6;

if(frog.tongueLength>90){
frog.tongueActive=false;
frog.tongueLength=0;
}

}

}

function drawBug(bug){

bug.wing+=0.3;

ctx.fillStyle="black";

ctx.beginPath();
ctx.arc(bug.x,bug.y,5,0,Math.PI*2);
ctx.fill();

ctx.strokeStyle="white";

ctx.beginPath();
ctx.moveTo(bug.x,bug.y);
ctx.lineTo(bug.x+Math.sin(bug.wing)*10,bug.y-6);
ctx.stroke();

}

function updateBugs(){

bugs.forEach(bug=>{

bug.x+=Math.sin(Date.now()*0.004)*bug.speed;
bug.y+=Math.cos(Date.now()*0.004)*bug.speed;

bug.x=Math.max(10,Math.min(canvas.width-10,bug.x));
bug.y=Math.max(10,Math.min(canvas.height-10,bug.y));

});

}

function checkCatch(){

if(!frog.tongueActive) return;

bugs = bugs.filter(bug=>{

let dx=frog.x-bug.x;
let dy=(frog.y-frog.tongueLength)-bug.y;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<20){

score++;
playBeep(700);

if(score>highScore){
highScore=score;
localStorage.setItem("frogHighScore",highScore);
}

return false;

}

return true;

});

}

function drawHUD(){

ctx.fillStyle="black";
ctx.font="18px Arial";

ctx.fillText("Level: "+level,10,20);
ctx.fillText("Score: "+score,10,40);
ctx.fillText("Time: "+timeLeft,10,60);
ctx.fillText("High Score: "+highScore,10,80);

}

function nextLevel(){

level++;
bugsNeeded++;
timeLeft=30;

playBeep(500);

spawnBugs();

}

function startGame(){

document.getElementById("menu").style.display="none";

level=1;
score=0;
bugsNeeded=5;
timeLeft=30;

spawnBugs();
gameRunning=true;

}

function gameOver(){

gameRunning=false;

document.getElementById("menuTitle").innerText=
"Game Over! Score: "+score;

document.getElementById("menu").style.display="flex";

}

setInterval(()=>{

if(!gameRunning) return;

timeLeft--;

if(timeLeft<=0){

if(score>=bugsNeeded){
nextLevel();
}
else{
gameOver();
}

}

},1000);

function gameLoop(){

drawBackground();

updateBugs();

drawFrog();

bugs.forEach(drawBug);

checkCatch();

drawHUD();

if(bugs.length===0){
nextLevel();
}

requestAnimationFrame(gameLoop);

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp") frog.y-=25;
if(e.key==="ArrowDown") frog.y+=25;
if(e.key==="ArrowLeft") frog.x-=25;
if(e.key==="ArrowRight") frog.x+=25;

if(e.key===" "){
frog.tongueActive=true;
frog.tongueLength=0;
playBeep(300);
}

});

document.getElementById("up").ontouchstart=()=>frog.y-=30;
document.getElementById("down").ontouchstart=()=>frog.y+=30;
document.getElementById("left").ontouchstart=()=>frog.x-=30;
document.getElementById("right").ontouchstart=()=>frog.x+=30;

document.getElementById("tongue").ontouchstart=()=>{

frog.tongueActive=true;
frog.tongueLength=0;
playBeep(300);

};

gameLoop();

</script>

</body>
</html>
