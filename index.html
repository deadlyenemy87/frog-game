<!DOCTYPE html>
<html>
<head>

<title>Frog Bug Hunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:#063d2c;
color:white;
overflow:hidden;
}

h1{
margin-top:10px;
}

canvas{
background:#7ec850;
border:4px solid #0b3d1d;
display:block;
margin:auto;
}

#menu{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

#menu button{
font-size:26px;
padding:15px 40px;
border:none;
border-radius:12px;
background:#ff4747;
color:white;
margin-top:20px;
}

#controls{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:center;
align-items:center;
gap:50px;
}

#joystickBase{
width:140px;
height:140px;
background:#2ecc71;
border-radius:50%;
position:relative;
}

#joystickKnob{
width:60px;
height:60px;
background:#145a32;
border-radius:50%;
position:absolute;
left:40px;
top:40px;
}

#tongue{
width:100px;
height:100px;
font-size:30px;
border:none;
border-radius:20px;
background:#b22222;
color:white;
}

</style>
</head>

<body>

<h1>🐸 Frog Bug Hunter</h1>

<div id="menu">
<h2>Catch the Bugs!</h2>
<button onclick="startGame()">Start Game</button>
</div>

<canvas id="game" width="700" height="420"></canvas>

<div id="controls">

<div id="joystickBase">
<div id="joystickKnob"></div>
</div>

<button id="tongue">👅</button>

</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let gameRunning=false;
let level=1;
let score=0;
let bugsNeeded=5;
let timeLeft=30;

let frog={
x:350,
y:200,
angle:0,
tongueLength:0,
tongueActive:false
};

let bugs=[];

function spawnBugs(){

bugs=[];

let count = level % 3 === 0 ? 1 : bugsNeeded;

for(let i=0;i<count;i++){

bugs.push({
x:Math.random()*660+20,
y:Math.random()*380+20,
size: level % 3 === 0 ? 16 : 8,
speed:1+level*0.3
});

}

}

function drawBackground(){

ctx.fillStyle="#7ec850";
ctx.fillRect(0,0,canvas.width,canvas.height);

}

function drawFrog(){

ctx.save();

ctx.translate(frog.x,frog.y);
ctx.rotate(frog.angle);

ctx.fillStyle="green";

ctx.beginPath();
ctx.arc(0,0,25,0,Math.PI*2);
ctx.fill();

ctx.fillRect(-20,15,12,18);
ctx.fillRect(8,15,12,18);

ctx.fillStyle="white";

ctx.beginPath();
ctx.arc(-10,-15,8,0,Math.PI*2);
ctx.arc(10,-15,8,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";

ctx.beginPath();
ctx.arc(-10,-15,3,0,Math.PI*2);
ctx.arc(10,-15,3,0,Math.PI*2);
ctx.fill();

if(frog.tongueActive){

ctx.strokeStyle="red";
ctx.lineWidth=4;

ctx.beginPath();
ctx.moveTo(0,0);
ctx.lineTo(0,-frog.tongueLength);
ctx.stroke();

frog.tongueLength+=7;

if(frog.tongueLength>110){
frog.tongueActive=false;
frog.tongueLength=0;
}

}

ctx.restore();

}

function drawBug(bug){

ctx.fillStyle="black";

ctx.beginPath();
ctx.arc(bug.x,bug.y,bug.size,0,Math.PI*2);
ctx.fill();

ctx.strokeStyle="white";

ctx.beginPath();
ctx.moveTo(bug.x,bug.y);
ctx.lineTo(bug.x+10,bug.y-6);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(bug.x,bug.y);
ctx.lineTo(bug.x-10,bug.y-6);
ctx.stroke();

}

function updateBugs(){

bugs.forEach(bug=>{

if(level>=16){

bug.x += (Math.random()-0.5)*bug.speed*6;
bug.y += (Math.random()-0.5)*bug.speed*6;

}else{

bug.x += Math.sin(Date.now()*0.003)*bug.speed;
bug.y += Math.cos(Date.now()*0.003)*bug.speed;

}

});

}

function rotateFrog(){

if(bugs.length===0)return;

let t=bugs[0];

let dx=t.x-frog.x;
let dy=t.y-frog.y;

frog.angle=Math.atan2(dy,dx)+Math.PI/2;

}

function checkCatch(){

if(!frog.tongueActive)return;

bugs=bugs.filter(b=>{

let dx=frog.x-b.x;
let dy=frog.y-b.y;

if(Math.sqrt(dx*dx+dy*dy)<30){

score++;
return false;

}

return true;

});

}

function drawHUD(){

ctx.fillStyle="black";
ctx.font="18px Arial";

ctx.fillText("Level: "+level,10,20);
ctx.fillText("Score: "+score,10,40);
ctx.fillText("Time: "+timeLeft,10,60);

}

function nextLevel(){

if(level>=20){

gameOver("You beat all 20 levels!");

return;

}

level++;
bugsNeeded++;
timeLeft=30;

spawnBugs();

}

function startGame(){

document.getElementById("menu").style.display="none";

level=1;
score=0;
bugsNeeded=5;
timeLeft=30;

spawnBugs();

gameRunning=true;

}

function gameOver(msg){

gameRunning=false;

document.getElementById("menu").style.display="flex";
document.querySelector("#menu h2").innerText=msg+" Score:"+score;

}

setInterval(()=>{

if(!gameRunning)return;

timeLeft--;

if(timeLeft<=0){

if(score>=bugsNeeded){
nextLevel();
}else{
gameOver("Game Over!");
}

}

},1000);

function gameLoop(){

drawBackground();
rotateFrog();
updateBugs();
drawFrog();

bugs.forEach(drawBug);

checkCatch();
drawHUD();

if(bugs.length===0)nextLevel();

requestAnimationFrame(gameLoop);

}

gameLoop();

let knob=document.getElementById("joystickKnob");
let base=document.getElementById("joystickBase");

let joy=false;

base.addEventListener("touchstart",()=>{joy=true});

base.addEventListener("touchend",()=>{

joy=false;
knob.style.left="40px";
knob.style.top="40px";

});

base.addEventListener("touchmove",(e)=>{

if(!joy)return;

let rect=base.getBoundingClientRect();

let x=e.touches[0].clientX-rect.left-70;
let y=e.touches[0].clientY-rect.top-70;

let dist=Math.sqrt(x*x+y*y);

if(dist>50){
x=x/dist*50;
y=y/dist*50;
}

knob.style.left=(x+40)+"px";
knob.style.top=(y+40)+"px";

frog.x+=x*0.1;
frog.y+=y*0.1;

});

document.getElementById("tongue").onclick=()=>{

frog.tongueActive=true;
frog.tongueLength=0;

};

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowUp")frog.y-=15;
if(e.key==="ArrowDown")frog.y+=15;
if(e.key==="ArrowLeft")frog.x-=15;
if(e.key==="ArrowRight")frog.x+=15;

if(e.key===" "){

frog.tongueActive=true;
frog.tongueLength=0;

}

});

</script>

</body>
</html>
