<!DOCTYPE html>
<html>
<head>

<title>Frog Bug Hunter</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>

body{
margin:0;
font-family:Arial;
background:#063d1e;
color:white;
text-align:center;
touch-action:none;
overflow:hidden;
}

h1{
margin-top:10px;
}

#gameContainer{
position:relative;
max-width:700px;
margin:auto;
}

canvas{
background:#2e5d1a;
border:5px solid black;
width:100%;
height:auto;
}

#hud{
position:absolute;
top:10px;
left:10px;
font-size:18px;
text-align:left;
}

#startScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
}

#startBtn{
font-size:26px;
padding:15px 40px;
margin-top:20px;
border:none;
border-radius:12px;
background:#4CAF50;
color:white;
}

#joystick{
position:fixed;
bottom:30px;
left:30px;
width:120px;
height:120px;
background:rgba(0,255,0,0.35);
border-radius:50%;
}

#stick{
position:absolute;
width:50px;
height:50px;
background:#0a5a2f;
border-radius:50%;
top:35px;
left:35px;
}

#tongueBtn{
position:fixed;
bottom:40px;
right:40px;
width:90px;
height:90px;
border-radius:20px;
background:#b71c1c;
font-size:40px;
color:white;
border:none;
}

</style>
</head>

<body>

<h1>🐸 Frog Bug Hunter</h1>

<div id="gameContainer">

<div id="hud">
Level: <span id="level">1</span><br>
Score: <span id="score">0</span><br>
Time: <span id="time">30</span>
</div>

<canvas id="game" width="700" height="450"></canvas>

<div id="startScreen">

<h2>How To Play</h2>

<p>
Move with joystick or keyboard arrows.<br><br>
Tap 👅 or press SPACE to shoot tongue.<br><br>
Catch all bugs before time runs out.<br><br>
Boss bugs appear every 3 levels.<br><br>
Levels 16-20 are extremely fast!
</p>

<button id="startBtn">Start Game</button>

</div>

</div>

<div id="joystick">
<div id="stick"></div>
</div>

<button id="tongueBtn">👅</button>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let frog={
x:350,
y:225,
size:25,
speed:5,
tongueLength:0,
tongueMax:120,
tongueActive:false
}

let bugs=[]
let keys={}
let score=0
let level=1
let timeLeft=30
let gameRunning=false

function spawnBug(){

let speed=1+level*0.4
if(level>15) speed*=2.5

bugs.push({
x:Math.random()*650,
y:Math.random()*400,
vx:(Math.random()-0.5)*speed,
vy:(Math.random()-0.5)*speed,
size:10
})

}

function spawnBoss(){

bugs.push({
x:Math.random()*650,
y:Math.random()*400,
vx:(Math.random()-0.5)*2,
vy:(Math.random()-0.5)*2,
size:22,
boss:true
})

}

function startLevel(){

bugs=[]

let count=3+level

for(let i=0;i<count;i++) spawnBug()

if(level%3==0) spawnBoss()

timeLeft=30

document.getElementById("level").innerText=level

}

function drawFrog(){

ctx.fillStyle="#1fa34a"

ctx.beginPath()
ctx.arc(frog.x,frog.y,frog.size,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#145c2e"
ctx.lineWidth=6

ctx.beginPath()
ctx.moveTo(frog.x-20,frog.y+10)
ctx.lineTo(frog.x-35,frog.y+25)

ctx.moveTo(frog.x+20,frog.y+10)
ctx.lineTo(frog.x+35,frog.y+25)
ctx.stroke()

ctx.fillStyle="white"

ctx.beginPath()
ctx.arc(frog.x-10,frog.y-20,8,0,Math.PI*2)
ctx.arc(frog.x+10,frog.y-20,8,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"

ctx.beginPath()
ctx.arc(frog.x-10,frog.y-20,3,0,Math.PI*2)
ctx.arc(frog.x+10,frog.y-20,3,0,Math.PI*2)
ctx.fill()

if(frog.tongueActive){

ctx.strokeStyle="red"
ctx.lineWidth=6

ctx.beginPath()
ctx.moveTo(frog.x,frog.y)
ctx.lineTo(frog.x,frog.y-frog.tongueLength)
ctx.stroke()

}

}

function drawBug(b){

ctx.fillStyle=b.boss?"red":"black"

ctx.beginPath()
ctx.arc(b.x,b.y,b.size,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="white"

ctx.beginPath()
ctx.moveTo(b.x-6,b.y-6)
ctx.lineTo(b.x-14,b.y-14)

ctx.moveTo(b.x+6,b.y-6)
ctx.lineTo(b.x+14,b.y-14)
ctx.stroke()

}

function update(){

if(!gameRunning) return

if(keys["ArrowUp"]) frog.y-=frog.speed
if(keys["ArrowDown"]) frog.y+=frog.speed
if(keys["ArrowLeft"]) frog.x-=frog.speed
if(keys["ArrowRight"]) frog.x+=frog.speed

bugs.forEach(b=>{

b.x+=b.vx
b.y+=b.vy

if(b.x<0||b.x>700) b.vx*=-1
if(b.y<0||b.y>450) b.vy*=-1

})

if(frog.tongueActive){

frog.tongueLength+=12

bugs.forEach((b,i)=>{

let dx=b.x-frog.x
let dy=b.y-frog.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist < frog.tongueLength){

score+=b.boss?5:1
bugs.splice(i,1)

document.getElementById("score").innerText=score

}

})

if(frog.tongueLength>frog.tongueMax){
frog.tongueActive=false
}

}

if(bugs.length==0){

level++

if(level>20){

alert("You beat the game!")

level=1
score=0

}

startLevel()

}

}

function draw(){

ctx.clearRect(0,0,700,450)

drawFrog()

bugs.forEach(drawBug)

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

document.addEventListener("keydown",e=>{
keys[e.key]=true
if(e.code==="Space") shootTongue()
})

document.addEventListener("keyup",e=>{
keys[e.key]=false
})

function shootTongue(){

if(frog.tongueActive) return

frog.tongueActive=true
frog.tongueLength=0

}

document.getElementById("tongueBtn").onclick=shootTongue

setInterval(()=>{

if(!gameRunning) return

timeLeft--

document.getElementById("time").innerText=timeLeft

if(timeLeft<=0){

alert("Time's up!")

level=1
score=0

startLevel()

}

},1000)

document.getElementById("startBtn").onclick=()=>{

document.getElementById("startScreen").style.display="none"

gameRunning=true

startLevel()

}

let joystick=document.getElementById("joystick")
let stick=document.getElementById("stick")

joystick.addEventListener("touchmove",e=>{

let rect=joystick.getBoundingClientRect()

let x=e.touches[0].clientX-rect.left-60
let y=e.touches[0].clientY-rect.top-60

let dist=Math.sqrt(x*x+y*y)

if(dist>50){
x*=50/dist
y*=50/dist
}

stick.style.left=(x+35)+"px"
stick.style.top=(y+35)+"px"

frog.x+=x*0.15
frog.y+=y*0.15

})

joystick.addEventListener("touchend",()=>{

stick.style.left="35px"
stick.style.top="35px"

})

</script>

</body>
</html>
