<!DOCTYPE html>
<html>
<head>
<title>Frog Bug Hunter</title>

<style>

body{
text-align:center;
background:#bfe7a1;
font-family:Arial;
}

canvas{
background:#e8f9ff;
border:3px solid black;
}

#controls{
margin-top:15px;
}

button{
font-size:24px;
padding:12px 18px;
margin:5px;
border-radius:10px;
border:none;
background:#4CAF50;
color:white;
}

button:active{
background:#2e7d32;
}

</style>

</head>

<body>

<h1>🐸 Frog Bug Hunter</h1>

<p>Use arrow keys or touch buttons • Tap tongue to catch bugs</p>

<canvas id="game" width="600" height="400"></canvas>

<div id="controls">

<button id="up">⬆</button><br>
<button id="left">⬅</button>
<button id="tongue">👅</button>
<button id="right">➡</button><br>
<button id="down">⬇</button>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let level = 1;
let score = 0;
let timeLeft = 30;
let bugsNeeded = 5;

let frog = {
x:300,
y:200,
size:25,
tongueLength:0,
tongueActive:false
};

let bugs = [];

function spawnBugs(){

bugs = [];

for(let i=0;i<bugsNeeded;i++){

bugs.push({
x:Math.random()*560+20,
y:Math.random()*360+20,
speed:1+level*0.4,
type:Math.floor(Math.random()*3)
});

}

}

function drawFrog(){

ctx.fillStyle="green";
ctx.beginPath();
ctx.arc(frog.x,frog.y,frog.size,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="green";
ctx.fillRect(frog.x-18,frog.y+15,10,15);
ctx.fillRect(frog.x+8,frog.y+15,10,15);

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(frog.x-10,frog.y-15,8,0,Math.PI*2);
ctx.arc(frog.x+10,frog.y-15,8,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(frog.x-10,frog.y-15,3,0,Math.PI*2);
ctx.arc(frog.x+10,frog.y-15,3,0,Math.PI*2);
ctx.fill();

if(frog.tongueActive){

ctx.strokeStyle="red";
ctx.lineWidth=4;

ctx.beginPath();
ctx.moveTo(frog.x,frog.y);
ctx.lineTo(frog.x,frog.y-frog.tongueLength);
ctx.stroke();

frog.tongueLength+=6;

if(frog.tongueLength>80){
frog.tongueActive=false;
frog.tongueLength=0;
}

}

}

function drawBug(bug){

if(bug.type===0){

ctx.fillStyle="black";

ctx.beginPath();
ctx.arc(bug.x,bug.y,6,0,Math.PI*2);
ctx.fill();

}

if(bug.type===1){

ctx.fillStyle="brown";

ctx.fillRect(bug.x-5,bug.y-3,10,6);

}

if(bug.type===2){

ctx.fillStyle="purple";

ctx.beginPath();
ctx.arc(bug.x,bug.y,5,0,Math.PI*2);
ctx.fill();

}

}

function updateBugs(){

bugs.forEach(bug=>{

bug.x+= (Math.random()-0.5)*bug.speed*2;
bug.y+= (Math.random()-0.5)*bug.speed*2;

bug.x=Math.max(10,Math.min(canvas.width-10,bug.x));
bug.y=Math.max(10,Math.min(canvas.height-10,bug.y));

});

}

function checkCatch(){

if(!frog.tongueActive) return;

bugs = bugs.filter(bug=>{

let dx = frog.x - bug.x;
let dy = (frog.y - frog.tongueLength) - bug.y;

let dist = Math.sqrt(dx*dx + dy*dy);

if(dist < 20){
score++;
return false;
}

return true;

});

}

function drawHUD(){

ctx.fillStyle="black";
ctx.font="18px Arial";

ctx.fillText("Level: "+level,10,20);
ctx.fillText("Score: "+score,10,40);
ctx.fillText("Time: "+timeLeft,10,60);

}

function nextLevel(){

if(level>=20){
alert("You beat all 20 levels! 🐸");
level=1;
score=0;
}

level++;
timeLeft=30;
bugsNeeded++;

spawnBugs();

}

function startLevel(){

timeLeft=30;
spawnBugs();

}

setInterval(()=>{

timeLeft--;

if(timeLeft<=0){

if(score>=bugsNeeded){
nextLevel();
}
else{
alert("Game Over!");
level=1;
score=0;
startLevel();
}

}

},1000);

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

updateBugs();

drawFrog();

bugs.forEach(drawBug);

checkCatch();

drawHUD();

if(bugs.length===0){
nextLevel();
}

requestAnimationFrame(gameLoop);

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp") frog.y-=20;
if(e.key==="ArrowDown") frog.y+=20;
if(e.key==="ArrowLeft") frog.x-=20;
if(e.key==="ArrowRight") frog.x+=20;

if(e.key===" "){
frog.tongueActive=true;
frog.tongueLength=0;
}

});

document.getElementById("up").ontouchstart=()=>frog.y-=30;
document.getElementById("down").ontouchstart=()=>frog.y+=30;
document.getElementById("left").ontouchstart=()=>frog.x-=30;
document.getElementById("right").ontouchstart=()=>frog.x+=30;

document.getElementById("tongue").ontouchstart=()=>{

frog.tongueActive=true;
frog.tongueLength=0;

};

startLevel();
gameLoop();

</script>

</body>
</html>
